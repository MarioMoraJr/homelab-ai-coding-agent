services:
  code-server:
    build:
      context: .
      dockerfile: Dockerfile.code-server
    image: homelab-code-server:latest
    container_name: homelab_code_server
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      PASSWORD: ${CODE_SERVER_PASSWORD:?Set CODE_SERVER_PASSWORD in .env before starting}
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}
    volumes:
      - ./workspace:/home/coder/workspace
      - ./config/agent-rules.md:/home/coder/agent-rules.md:ro
    working_dir: /home/coder/workspace
    entrypoint:
      - /bin/sh
      - -lc
      - socat TCP-LISTEN:11434,fork,reuseaddr TCP:host.docker.internal:11434 & exec /usr/bin/entrypoint.sh --bind-addr 0.0.0.0:8080 .

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: homelab_open_webui
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - open-webui-data:/app/backend/data

  openhands:
    image: docker.openhands.dev/openhands/openhands:1.8
    container_name: homelab_openhands
    profiles:
      - openhands
    restart: unless-stopped
    ports:
      - "8083:3000"
    environment:
      AGENT_SERVER_IMAGE_REPOSITORY: ghcr.io/openhands/agent-server
      AGENT_SERVER_IMAGE_TAG: 1.26.0-python
      LOG_ALL_EVENTS: "true"
      OH_PERSISTENCE_DIR: /.openhands
      LLM_API_KEY: ${OPENHANDS_LLM_API_KEY:-local-llm}
      LLM_MODEL: ${OPENHANDS_LLM_MODEL:-openai/qwen2.5-coder:7b}
      LLM_BASE_URL: ${OPENHANDS_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      SANDBOX_VOLUMES: ${OPENHANDS_SANDBOX_VOLUMES:-/run/desktop/mnt/host/c/Users/mario/server/ai-coding-agent/workspace:/workspace:rw}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands-data:/.openhands

volumes:
  open-webui-data:
  openhands-data:
