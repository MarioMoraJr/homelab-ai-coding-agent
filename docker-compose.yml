services:
  code-server:
    build:
      context: .
      dockerfile: Dockerfile.code-server
    image: homelab-code-server:latest
    container_name: homelab_code_server
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      PASSWORD: ${CODE_SERVER_PASSWORD:?Set CODE_SERVER_PASSWORD in .env before starting}
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_GENAI_USE_VERTEXAI: ${GOOGLE_GENAI_USE_VERTEXAI:-}
      GOOGLE_GENAI_USE_GCA: ${GOOGLE_GENAI_USE_GCA:-}
    volumes:
      - ./workspace:/home/coder/workspace
      - ./config/agent-rules.md:/home/coder/agent-rules.md:ro
      - gemini-cli-data:/home/coder/.gemini
    working_dir: /home/coder/workspace
    entrypoint:
      - /bin/sh
      - -lc
      - socat TCP-LISTEN:11434,fork,reuseaddr TCP:host.docker.internal:11434 & exec /usr/bin/entrypoint.sh --bind-addr 0.0.0.0:8080 .

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: homelab_open_webui
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - open-webui-data:/app/backend/data

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: homelab_litellm
    profiles:
      - litellm
    restart: unless-stopped
    ports:
      - "8084:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local}
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"
      - --host
      - 0.0.0.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/litellm.yaml:/app/config.yaml:ro

  openhands:
    image: docker.openhands.dev/openhands/openhands:1.8
    container_name: homelab_openhands
    profiles:
      - openhands
    restart: unless-stopped
    ports:
      - "8083:3000"
    environment:
      AGENT_SERVER_IMAGE_REPOSITORY: homelab-openhands-agent-server
      AGENT_SERVER_IMAGE_TAG: latest
      LOG_ALL_EVENTS: "true"
      OH_PERSISTENCE_DIR: /.openhands
      WEB_HOST: ${OPENHANDS_WEB_HOST:-host.docker.internal:8083}
      OH_WEB_URL: ${OPENHANDS_WEB_URL:-http://host.docker.internal:8083}
      LLM_API_KEY: ${OPENHANDS_LLM_API_KEY:-local-llm}
      LLM_MODEL: ${OPENHANDS_LLM_MODEL:-openai/qwen2.5-coder:7b}
      LLM_BASE_URL: ${OPENHANDS_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      SANDBOX_USER_ID: ${OPENHANDS_SANDBOX_USER_ID:-1000}
      SANDBOX_VOLUMES: ${OPENHANDS_SANDBOX_VOLUMES:-/run/desktop/mnt/host/c/Users/mario/server/ai-coding-agent/workspace:/workspace/project:rw}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands-data:/.openhands

volumes:
  open-webui-data:
  openhands-data:
  gemini-cli-data:
